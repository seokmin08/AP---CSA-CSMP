<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Result</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="page">
        <div class="card result-card">
            <div style="margin-bottom: 24px; text-align: center;">
                <h1 style="margin-bottom: 10px;">시험 리뷰</h1>
                <p id="test-name-text" style="font-size: 18px; font-weight: 600; margin-bottom: 18px;"></p>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 28px;">
                <div style="background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; text-align: center;">
                    <div style="font-size: 14px; color: #6b7280; margin-bottom: 6px;">점수</div>
                    <div id="score-text" style="font-size: 24px; font-weight: 700;"></div>
                </div>
                <div style="background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; text-align: center;">
                    <div style="font-size: 14px; color: #6b7280; margin-bottom: 6px;">소요 시간</div>
                    <div id="time-text" style="font-size: 24px; font-weight: 700;"></div>
                </div>
            </div>

            <div style="margin-bottom: 16px;">
                <h2 style="margin-bottom: 8px;">문제별 확인</h2>
                <p style="color: #6b7280; margin: 0;">각 문제에서 내가 고른 답, 정답, 맞고 틀린 결과를 한눈에 볼 수 있습니다.</p>
            </div>

            <div id="result-list"></div>

            <div class="result-buttons" style="margin-top: 28px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                <a href="home.html" class="btn">홈으로 돌아가기</a>
                <button onclick="resetData()" class="btn">데이터 초기화</button>
            </div>
        </div>
    </div>

    <script type="module" src="../js/result.js"></script>
</body>
</html>
