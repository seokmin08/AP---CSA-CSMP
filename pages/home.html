<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Home</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>Student Home</h1>
            <h2 id="user-name"></h2>
            <p>AP CSA - CSMP</p>
            <p>날짜에 맞게 연습 문제를 풀어보세요. ^_^</p>
            <a href="../index.html" class="btn">Log Out</a>
        </div>

        <div class="card">
            <h2>Available Tests</h2>
            <div class="test-list">
                <div class="test-item">
                    <h3>Test 1 & 30 Minutes & 3/26</h3>
                    <p>AP CSA MCQ Practice Set 1</p>
                    <a href="test1.html" class="btn" id="test1-btn">Start Test 1</a>
                </div>

                <div class="test-item">
                    <h3>Test 2 & 45 Minutes & 4/2</h3>
                    <p>AP CSA MCQ & FRQ Practice Set 2</p>
                    <a href="test2.html" class="btn" id="test2-btn">Start Test 2</a>
                </div>
            </div>
        </div>
    </div>
</body>
<script>
    const user = localStorage.getItem("currentUser");
    if (user) {
        document.getElementById("user-name").textContent = "Welcome, " + user;
    }

    const test1Key = `submitted_${user}_Test 1`;
    const test1Btn = document.getElementById("test1-btn");
    const test2Key = `submitted_${user}_Test 2`;
    const test2Btn = document.getElementById("test2-btn");

    if (localStorage.getItem(test1Key) === "true") {
        test1Btn.textContent = "Review Test 1";
        test1Btn.href = "result.html";
    }
    if (localStorage.getItem(test2Key) === "true") {
        test2Btn.textContent = "Review Test 2";
        test2Btn.href = "result.html";
    }
</script>
</html>
