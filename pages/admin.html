<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 페이지</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <h1>관리자 대시보드</h1>
    <p>시험 결과 및 통계를 확인합니다.</p>
    <a href="../index.html">로그아웃</a>

    <h2>요약</h2>
    <div id="admin-summary" style="display:flex; gap:16px; flex-wrap:wrap; margin:20px 0;">
        <div style="border:1px solid #111827; padding:12px; min-width:160px;">
            <strong>응시자</strong>
            <p id="total-submissions">0</p>
        </div>
        <div style="border:1px solid #111827; padding:12px; min-width:160px;">
            <strong>평균 점수</strong>
            <p id="average-score">0 / 0</p>
        </div>
        <div style="border:1px solid #111827; padding:12px; min-width:160px;">
            <strong>최고 점수</strong>
            <p id="highest-score">0 / 0</p>
        </div>
        <div style="border:1px solid #111827; padding:12px; min-width:160px;">
            <strong>최저 점수</strong>
            <p id="lowest-score">0 / 0</p>
        </div>
    </div>

    <h2>학생 응시 결과</h2>
    <table style="width:100%; margin-top:10px; text-align:left;">
        <thead>
            <tr>
                <th>학생</th>
                <th>시험</th>
                <th>점수</th>
                <th>시간</th>
                <th>오답</th>
            </tr>
        </thead>
        <tbody id="submission-table"></tbody>
    </table>

    <script type="module" src="../js/admin.js"></script>
</body>
</html>
